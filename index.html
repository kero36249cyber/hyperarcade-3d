<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boostfall Arena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <canvas id="game" aria-label="Boostfall Arena game canvas"></canvas>

      <section class="hud hud-top">
        <div class="score-block blue">
          <span class="label">Blue</span>
          <strong id="blueScore">0</strong>
        </div>
        <div class="timer" id="timer">03:00</div>
        <div class="score-block red">
          <span class="label">Red</span>
          <strong id="redScore">0</strong>
        </div>
      </section>

      <section class="hud status-panel">
        <div>
          <span>Health</span>
          <meter id="health" min="0" max="100" value="100"></meter>
        </div>
        <div>
          <span>Armor</span>
          <meter id="armor" min="0" max="100" value="45"></meter>
        </div>
        <div>
          <span>Boost</span>
          <meter id="boost" min="0" max="100" value="72"></meter>
        </div>
      </section>

      <section class="hud mode-panel">
        <button id="pauseBtn" type="button" title="Pause">II</button>
        <button id="resetBtn" type="button" title="Reset match">↻</button>
        <span id="feed">Kickoff ready</span>
      </section>

      <canvas id="radar" class="radar" width="172" height="172" aria-hidden="true"></canvas>

      <section class="menu" id="menu">
        <div class="menu-panel">
          <p class="eyebrow">Rocket car battle arena</p>
          <h1>Boostfall Arena</h1>
          <p class="summary">Score goals, survive the closing zone, ram rival cars, collect armor, and use boost to turn the whole field into chaos.</p>
          <div class="menu-actions">
            <button id="playBtn" type="button">Play</button>
            <button id="trainingBtn" type="button">Training</button>
          </div>
          <dl class="controls">
            <div><dt>Drive</dt><dd>WASD or arrows</dd></div>
            <div><dt>Boost</dt><dd>Shift</dd></div>
            <div><dt>Jump</dt><dd>Space</dd></div>
            <div><dt>Handbrake</dt><dd>Q / E</dd></div>
            <div><dt>Pause</dt><dd>P</dd></div>
          </dl>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
